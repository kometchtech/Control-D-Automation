name: Sync Control D folders from upstream

# ── Schedule ───────────────────────────────────────────────────────────────────
# Runs twice daily.  Can also be triggered manually from the Actions tab.
on:
#  schedule:
#    - cron: '0 5  * * *'   # 05:00 UTC daily
#    - cron: '0 17 * * *'   # 17:00 UTC daily
  workflow_dispatch:

# ── Concurrency ────────────────────────────────────────────────────────────────
# Prevent overlapping runs (e.g. scheduled + manual trigger at the same time).
# A new run cancels any in-progress run so the latest upstream state always wins.
concurrency:
  group: controld-sync
  cancel-in-progress: true

# ── Permissions ────────────────────────────────────────────────────────────────
# contents: write — needed to commit synced JSON files back to the repo.
# Everything else is explicitly denied (principle of least privilege).
permissions:
  contents: write
  actions: none
  checks: none
  deployments: none
  id-token: none
  issues: none
  packages: none
  pages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

# ── Jobs ───────────────────────────────────────────────────────────────────────
jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Checkout without persisting credentials; the sync script passes the
      # token URL directly to git push (one-shot) so it is never written to
      # .git/config and cannot appear in git error logs persistently.
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt

      # ── Stage 1: Sync files from upstream ────────────────────────────────────
      # Downloads the target JSON files from hagezi/dns-blocklists, diffs them
      # against the local copies, commits changes, and sets changed=true/false.
      - name: Sync files from upstream
        id: sync
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/controld_sync.py

      # ── Stage 2: Push domain changes to Control D API ────────────────────────
      # Only runs when Stage 1 detected file changes.
      # The email report is sent from within the script before sys.exit(), so it
      # is delivered regardless of success or failure. The job fails on errors.
      - name: Push changes to Control D API
        id: push
        if: steps.sync.outputs.changed == 'true'
        env:
          CTRLD_API_TOKEN: ${{ secrets.CTRLD_API_TOKEN }}
          EMAIL_USERNAME:  ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python scripts/controld_api_push.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Control D API push finished with errors (exit $EXIT_CODE). Check the step log."
            exit $EXIT_CODE
          fi
